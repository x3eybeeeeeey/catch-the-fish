<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم التسجيل بنجاح | CATCH THE FISH</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --gold-primary: #D4AF37; 
            --gold-light: #F9E586;
            --bg-dark: #000000;
            --bg-gray: #1a1a1a; 
        }
        body {
            background: linear-gradient(180deg, var(--bg-dark) 0%, var(--bg-gray) 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            color: #fff;
            text-align: center;
            overflow: hidden;
        }
        .success-card {
            padding: 60px 30px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 40px;
            background: rgba(255,255,255,0.02);
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .icon-box {
            font-size: 60px;
            color: var(--gold-primary);
            margin-bottom: 25px;
            animation: bounce 2s infinite;
        }
        h1 {
            font-family: 'Inter', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 15px;
            background: linear-gradient(to bottom, var(--gold-light), var(--gold-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p { opacity: 0.8; line-height: 1.8; font-size: 1.1rem; margin-bottom: 30px; }
        .btn-back {
            display: inline-block;
            background: var(--gold-primary);
            color: #000;
            padding: 15px 40px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }
        .btn-back:hover { background: #fff; transform: scale(1.05); }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

<div class="success-card">
    <div class="icon-box">🏆</div>
    <h1>SUCCESSFULLY JOINED!</h1>
    <h2 style="font-weight: 600; margin-bottom: 20px;">تم انضمامك بنجاح!</h2>
    <p>لقد استلمنا طلبك بنجاح. سنقوم بالتواصل معك عبر البريد الإلكتروني لتفعيل حسابك في الأكاديمية قريباً.<br>
    We have received your request. We will contact you via email to activate your account soon.</p>
    
    <a href="index.html" class="btn-back">العودة للموقع / Back to Site</a>
</div>

</body>
</html>
